name: Performance Test

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install streamlit sentence-transformers bertopic locust

      - name: Start Streamlit app
        run: |
          nohup streamlit run app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &
          sleep 40

      - name: Show Streamlit log
        run: cat streamlit.log || true

      - name: Check app is reachable
        run: curl -I http://127.0.0.1:8501

      - name: Run Locust performance test
        run: |
          mkdir -p performance/results
          locust -f performance/locustfile.py \
            --host http://127.0.0.1:8501 \
            --users 20 \
            --spawn-rate 5 \
            --run-time 1m \
            --headless \
            --html performance/results/report.html \
            --csv performance/results/locust

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: performance/results/
